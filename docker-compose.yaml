version: "3"
services:
  db:
    image: "mariadb:10.5.8"
    volumes:
      - "db_data:/var/lib/mysql"
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    networks:
      - wpsite
  phpmyadmin:
    depends_on:
      - db
    image: "phpmyadmin:latest"
    restart: always
    ports:
      - "9036:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: password
    networks:
      - wpsite
  wordpress:
    depends_on:
      - db
    image: "wordpress:latest"
    ports:
      - "9037:80"
    restart: always
    volumes:
      - "./:/var/www/html/"
    environment:
      "0": php_max_upload
    networks:
      - wpsite
networks:
  wpsite: null
volumes:
  db_data: null
